name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck (P1 scope)
        run: yarn typecheck:p1

      - name: Lint
        run: yarn lint

      - name: Dependency audit (non-blocking)
        run: yarn audit || true

      - name: Tests
        run: yarn test

      - name: Build
        run: yarn build

  e2e-critical:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 25
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run critical E2E suite (non-blocking until SSR regressions are fixed)
        run: yarn test:e2e:critical

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-critical-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  docker-smoke:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: finhub-web:ci
