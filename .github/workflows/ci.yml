name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck (P1 scope)
        run: yarn typecheck:p1

      - name: Lint
        run: yarn lint

      - name: Dependency audit (non-blocking)
        run: yarn audit || true

      - name: Tests
        run: yarn test

      - name: Build
        run: yarn build
